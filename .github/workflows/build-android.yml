name: Build Flutter Release APK

on:
  push:
    branches: [ main, master ]
    tags: [ 'v*' ]               # 当推送 v 开头的标签时也会触发
  workflow_dispatch:
    inputs:
      tag_name:
        description: '要发布的标签名，例如 v1.0.4；留空则在 tag 触发时使用当前 tag'
        required: false
        type: string

# 关键：授予创建 Release 和上传附件的权限
permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.22.x'
          channel: stable
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Decode keystore
        run: |
          echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 --decode > android/upload-keystore.jks
          echo "storePassword=${{ secrets.KEYSTORE_PASSWORD }}" > android/key.properties
          echo "keyPassword=${{ secrets.KEY_PASSWORD }}" >> android/key.properties
          echo "keyAlias=${{ secrets.KEY_ALIAS }}" >> android/key.properties
          echo "storeFile=../upload-keystore.jks" >> android/key.properties

      - name: Build release APK
        run: flutter build apk --release

      - name: Resolve release tag
        id: meta
        shell: bash
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ] && [ -n "${{ github.event.inputs.tag_name }}" ]; then
            echo "tag_name=${{ github.event.inputs.tag_name }}" >> "$GITHUB_OUTPUT"
          elif [[ "${{ github.ref }}" == refs/tags/v* ]]; then
            echo "tag_name=${{ github.ref_name }}" >> "$GITHUB_OUTPUT"
          else
            echo "tag_name=" >> "$GITHUB_OUTPUT"
          fi

      # 调试：列出生成的 APK 文件（可选，便于排查）
      - name: List APK files
        run: ls -la build/app/outputs/flutter-apk/

      - name: Upload APK artifacts (workflow run)
        uses: actions/upload-artifact@v4
        with:
          name: release-apks
          path: build/app/outputs/flutter-apk/app-release.apk
          retention-days: 30

      # 关键：用 GitHub CLI 创建/更新 Release，并附带 APK 文件
      - name: Publish to GitHub Releases
        if: steps.meta.outputs.tag_name != ''
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        shell: bash
        run: |
          TAG_NAME="${{ steps.meta.outputs.tag_name }}"
          APK_FILE="build/app/outputs/flutter-apk/app-release.apk"

          if gh release view "$TAG_NAME" >/dev/null 2>&1; then
            gh release upload "$TAG_NAME" "$APK_FILE" --clobber
          else
            gh release create "$TAG_NAME" \
              --target "${{ github.sha }}" \
              --title "$TAG_NAME" \
              --generate-notes \
              "$APK_FILE"
          fi