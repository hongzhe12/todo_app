name: Build Flutter Release APK

on:
  push:
    branches: [ main, master ]
    tags: [ 'v*' ]               # 当推送 v 开头的标签时也会触发
  workflow_dispatch:              # 允许手动触发

# 关键：授予创建 Release 和上传附件的权限
permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.22.x'
          channel: stable
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Decode keystore
        run: |
          echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 --decode > android/upload-keystore.jks
          echo "storePassword=${{ secrets.KEYSTORE_PASSWORD }}" > android/key.properties
          echo "keyPassword=${{ secrets.KEY_PASSWORD }}" >> android/key.properties
          echo "keyAlias=${{ secrets.KEY_ALIAS }}" >> android/key.properties
          echo "storeFile=../upload-keystore.jks" >> android/key.properties

      - name: Build release APK
        run: flutter build apk --release

      # 调试：列出生成的 APK 文件（可选，便于排查）
      - name: List APK files
        run: ls -la build/app/outputs/flutter-apk/

      - name: Upload APK artifacts (workflow run)
        uses: actions/upload-artifact@v4
        with:
          name: release-apks
          path: build/app/outputs/flutter-apk/app-release.apk
          retention-days: 30

      # 关键：仅当推送 v 开头的标签时才发布到 GitHub Releases
      - name: Publish to GitHub Releases
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v1
        with:
          files: build/app/outputs/flutter-apk/app-release.apk
          allow_updates: true          # 允许更新已存在的 Release
          append_body: false           # 不追加，直接覆盖 Release 说明（可选）
          fail_on_unmatched_files: true # 如果找不到 APK 文件则失败
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}